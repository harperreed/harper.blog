description: "<b>A private investigator is hired to look into a mysterious, high-profile\
  \ death aboard the starship Halcyon in this new noir/science fiction fusion from\
  \ the \u201Cmastersinger of space opera\u201D (<i>The Times</i>) and the creator\
  \ of the beloved Revelation Space universe, strap in for a gripping murder mystery.</b><br\
  \ /><br />Yuri Gagarin is a private investigator, who picks up small cases from\
  \ his local community, runs into trouble with the local police, and generally ekes\
  \ out a living as best he can. He's aboard the <i>Halcyon</i> \u2013 a starship,\
  \ hurtling through space, carrying thousands of passengers with thousands more sleeping\
  \ the journey away.<br /><br />Only his usual investigative work \u2013 catching\
  \ cheating spouses, and small time con artists \u2013 is about to take a turn. He's\
  \ hired by a mysterious woman called Ruby Red to look into a death in one of Halcyon's\
  \ most elite families\u2026 and then warned off the case again by a second mysterious\
  \ woman called Ruby Blue. Caught between the two, he's about to be embroiled in\
  \ a murder mystery in which \u2013 at any moment \u2013 he could be the latest victim.<br\
  \ /><br />Gripping, fast-paced fun this is a classic noir mystery with a science\
  \ fiction twist, which will keep you guessing, and on the edge of your seat, to\
  \ the end."
