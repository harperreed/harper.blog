description: "Forty years ago, the world nearly ended.<br /><br />Be is an old robot\
  \ who was there, and doesn\u2019t want to think about what happened, or what role\
  \ they played in that conflict. They have settled into a life of isolation in the\
  \ abandoned ruins of an old mill in the former New York Botanical Gardens, disinterested\
  \ in what has happened in the outside world since they stepped away from the war.\
  \ Someone out there, though, has not forgotten about them, and when they are attacked,\
  \ their person vandalized, and one of their leg stolen, they set out to find the\
  \ thief accompanied by a cyborg dog and a human mechanic.<br /><br />The world has\
  \ changed, but the recovery from the war is uneven and faltering, and Be begins\
  \ to suspect a malicious hand trying to rekindle the old conflict and finish what\
  \ was started. In order to stop them, Be needs to come to terms with both their\
  \ own past and who they have become, and how everything and everyone else they knew\
  \ has changed in their absence. Being left alone is no longer an option, and peace\
  \ may be impossible.<br /><br />This is a story about coming to terms with your\
  \ past, with who you\u2019ve become and who you still want to be: a tale of resilence\
  \ and hope, an ode to those struggling to become whole in a world half-broken."
