description: <b>From internationally bestselling author Peter F. Hamilton comes the
  first in a new, coming of age trilogy where life on a generation ship takes a turn
  for the worst when the delicate cycle of life is disturbed... A great read for fans
  of Alastair Reynolds and Miles Cameron.</b><br /><br />Sixteen-year old Hazel lives
  in the Daedalus, a generation ship on a centuries long flight in search of a new
  world. The ship has been traveling for 500 years, searching for a world to settle
  in after having to abandon its last world. Everyone on board Daedalus lives a very
  simple existence in farming villages. The age of machines supplying their needs
  was lost during a mutiny 500 years ago. The AI captain regained control of the ship
  after a huge struggle. Now, with finite resources, everything in the habitat is
  Cycled, including humans, who essentially are suicided at 65 so they don't deplete
  the biosphere's resources.<br /><br />Hazel encounters the Cheaters, people who
  refused to Cycle, who tell her the Daedalus has been damaged and its atmosphere
  is leaking away. When her brother has a paralyzing accident which condemns him to
  be Cycled since he can no longer be productive, Hazel runs off with him to join
  the Cheaters. While with the Cheaters, she discovers that much of what has been
  told to the people living on Daedalus for the last 500 years is untrue, and soon,
  Hazel is in a thrilling race to help repair the ship and help the people of the
  Daedalus.
