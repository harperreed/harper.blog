  to her only child. But when her ex-husband appears at her door without warning one
  day, her comfortable world is shattered. <br /><br />When Detective Kusanagi of
  the Tokyo Police tries to piece together the events of that day, he finds himself
  confronted by the most puzzling, mysterious circumstances he has ever investigated.
