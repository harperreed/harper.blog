description: "<b>It\u2019s off to the races in the explosive eighth book in the Dungeon\
  \ Crawler Carl series.</b><br /><br />As chaos and mass panic spread outside the\
  \ dungeon in the wake of Faction Wars, Carl and Donut find themselves on the tenth\
  \ floor, where they\u2019re forced to compete in a surprisingly normal set of tasks.\
  \ Well, normal for the dungeon.<br /><br />Races. Get from point A to point B, and\
  \ don\u2019t come in last. After each race, they pick an upgrade for their vehicle\
  \ and the track gets more challenging. It all seems a little too normal, a little\
  \ too simple.<br /><br />Ignore those strange glitches that are occurring with increasing\
  \ frequency. Don\u2019t listen to those whispers about what\u2019s happening on\
  \ the mysterious eleventh floor, something the system AI calls A Parade of Horribles.\
  \ Nobody, not even the showrunners, knows what that means. Just that the AI has\
  \ ominously dubbed it \u201Ca coming-out party for the ages.\u201D<br /><br /><i>Everything\
  \ is fine, Crawler. I repeat, everything is fine.</i><br /><br />Carl hates that\
  \ it\u2019s business as usual. The rules of this floor have taken away his agency.\
  \ That just will not do.<br /><br />So Carl is planning a party of his own. It\u2019\
  s a plan so dangerous, so insane, he can\u2019t even consult his friends lest the\
  \ AI put a stop to it. Because if it goes wrong, it\u2019s not just the end of Carl\
  \ and Donut. No. The stakes are higher than they\u2019ve ever been."
