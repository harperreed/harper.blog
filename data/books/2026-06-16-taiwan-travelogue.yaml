description: "May 1938. The young novelist Aoyama Chizuko has sailed from her home\
  \ in Nagasaki, Japan, and arrived in Taiwan. She\u2019s been invited there by the\
  \ Japanese government ruling the island, though she has no interest in their official\
  \ banquets or imperialist agenda. Instead, Chizuko longs to experience real island\
  \ life and to taste as much of its authentic cuisine as her famously monstrous appetite\
  \ can bear.<br /><br />Soon a Taiwanese woman\u2014who is younger even than she\
  \ is, and who shares the characters of her name\u2014is hired as her interpreter\
  \ and makes her dreams come true. The charming, erudite, meticulous Chizuru arranges\
  \ Chizuko\u2019s travels all over the Land of the South and also proves to be an\
  \ exceptional cook. Over scenic train rides and braised pork rice, lively banter\
  \ and winter melon tea, Chizuko grows infatuated with her companion and intent on\
  \ drawing her closer. But something causes Chizuru to keep her distance. It\u2019\
  s only after a heartbreaking separation that Chizuko begins to grasp what the \u201C\
  something\u201D is.<br /><br />Disguised as a translation of a rediscovered text\
  \ by a Japanese writer, this novel was a sensation on its first publication in Mandarin\
  \ Chinese in 2020 and won Taiwan\u2019s highest literary honor, the Golden Tripod\
  \ Award. <i>Taiwan Travelogue</i> unburies lost colonial histories and deftly reveals\
  \ how power dynamics inflect our most intimate relationships."
