description: "<b>John Green, the #1 bestselling author of <i>The Anthropocene Reviewed</i>\
  \ and a passionate advocate for global healthcare reform, tells a deeply human story\
  \ illuminating the fight against the world\u2019s deadliest disease.</b><br /> <br\
  \ />Tuberculosis has been entwined with humanity for millennia. Once romanticized\
  \ as a malady of poets, today tuberculosis is a disease of poverty that walks the\
  \ trails of injustice and inequity we blazed for it.<br /> <br />In 2019, John Green\
  \ met Henry, a young tuberculosis patient at Lakka Government Hospital in Sierra\
  \ Leone while traveling with Partners in Health. John became fast friends with Henry,\
  \ a boy with spindly legs and a big, goofy smile. In the years since that first\
  \ visit to Lakka, Green has become a vocal and dynamic advocate for increased access\
  \ to treatment and wider awareness of the healthcare inequities that allow this\
  \ curable, treatable infectious disease to also be the deadliest, killing 1.5 million\
  \ people every year.<br /> <br />In <i>Everything is Tuberculosis</i>, John tells\
  \ Henry\u2019s story, woven through with the scientific and social histories of\
  \ how tuberculosis has shaped our world and how our choices will shape the future\
  \ of tuberculosis."
