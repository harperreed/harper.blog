description: "<b><i>My name is Mawukana na-Vdnaze, and I am a very poor copy of myself.\
  \ </i><br /><br /><i>Slow Gods\_</i>is the galaxy-spanning tale \u200Bof one man's\
  \ impossible life charted against the fate of humanity amongst the stars\u2014a\
  \ powerfully imaginative space opera from multi-award-winning author Claire North.\_\
  </b><br /><br /> In telling my story, there are certain things I should perhaps\
  \ lie about. I should make myself a hero. Pretend I was not used by strangers and\
  \ gods, did not leave people behind.<br /> \_<br /> Here is one out there in deep\
  \ space, in the pilot's chair, I died.\_And then, I was reborn. I became something\
  \ not quite human, something that could speak to the infinite dark. And I\_vowed\
  \ to become the scourge of the world that wronged me.\_<br /><br /> This is the\
  \ story of the supernova event that burned planets and felled civilizations. This\
  \ is also the story of the many lives I've lived since I died for the first time.\_\
  \_<br /> \_<br /> Are you listening?"
