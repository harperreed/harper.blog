description: The war raged across the galaxy. Billions had died, billions more were
  doomed. Moons, planets, the very stars themselves, faced destruction, cold-blooded,
  brutal, and worse, random. The Idirans fought for their Faith; the Culture for its
  moral right to exist. Principles were at stake. There could be no surrender.<br
  /><br />Within the cosmic conflict, an individual crusade. Deep within a fabled
  labyrinth on a barren world, a Planet of the Dead proscribed to mortals, lay a fugitive
  Mind. Both the Culture and the Idirans sought it. It was the fate of Horza, the
  Changer, and his motley crew of unpredictable mercenaries, human and machine, actually
  to find it, and with it their own destruction.
