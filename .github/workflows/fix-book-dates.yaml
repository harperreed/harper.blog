name: Fix Book Dates (one-time)

on:
    workflow_dispatch:

jobs:
    fix-dates:
        runs-on: ubuntu-latest
        env:
            GOODREADS_KEY: ${{ secrets.GOODREADS_KEY }}
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"
                  enable-cache: true

            - name: Run fix_book_dates script
              working-directory: ./tools
              run: uv run python fix_book_dates.py

            - name: Show changes
              run: |
                  echo "=== Files changed ==="
                  git diff --stat
                  echo "=== Sample diffs ==="
                  git diff -- content/books/2025-02-25-neuromancer/index.md || true
                  git diff -- content/books/2025-02-25-dune/index.md || true

            - name: Commit and push
              run: |
                  git config --global user.name 'GitHub Action'
                  git config --global user.email 'action@github.com'
                  git add content/books/
                  git diff --quiet && git diff --staged --quiet || (git commit -m "fix: correct 116 book dates using Goodreads date_added" && git push)
